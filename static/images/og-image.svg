<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d1a"/>
      <stop offset="100%" stop-color="#0c1225"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(59,130,246,0.06)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Glow blob top-right -->
  <circle cx="1050" cy="150" r="300" fill="rgba(59,130,246,0.08)" filter="url(#glow)"/>
  <!-- Glow blob bottom-left -->
  <circle cx="150" cy="500" r="200" fill="rgba(96,165,250,0.05)" filter="url(#glow)"/>

  <!-- Left accent bar -->
  <rect x="80" y="200" width="4" height="230" rx="2" fill="url(#accent)" opacity="0.6"/>

  <!-- Name -->
  <text x="112" y="300"
        font-family="'Syne', 'Arial Black', sans-serif"
        font-size="72"
        font-weight="800"
        fill="white"
        letter-spacing="-2">
    Edlyn Exavier
  </text>

  <!-- Accent dot after name -->
  <circle cx="108" cy="285" r="6" fill="#3b82f6"/>

  <!-- Tagline -->
  <text x="112" y="360"
        font-family="'DM Sans', Arial, sans-serif"
        font-size="26"
        font-weight="400"
        fill="rgba(148,163,184,0.9)"
        letter-spacing="0.5">
    Electronic Engineering Technology · Developer · Builder
  </text>

  <!-- Divider -->
  <rect x="112" y="388" width="80" height="3" rx="1.5" fill="#3b82f6" opacity="0.7"/>

  <!-- Domain -->
  <text x="112" y="436"
        font-family="'DM Sans', Arial, sans-serif"
        font-size="20"
        font-weight="400"
        fill="rgba(96,165,250,0.8)"
        letter-spacing="0.5">
    edlynexavier.com
  </text>

  <!-- Right side: decorative code block -->
  <rect x="780" y="180" width="340" height="270" rx="12"
        fill="rgba(17,24,39,0.8)" stroke="rgba(59,130,246,0.2)" stroke-width="1"/>

  <!-- Code lines decorative -->
  <rect x="810" y="215" width="120" height="8" rx="4" fill="rgba(59,130,246,0.4)"/>
  <rect x="810" y="240" width="200" height="8" rx="4" fill="rgba(148,163,184,0.2)"/>
  <rect x="830" y="265" width="160" height="8" rx="4" fill="rgba(96,165,250,0.3)"/>
  <rect x="830" y="290" width="140" height="8" rx="4" fill="rgba(148,163,184,0.15)"/>
  <rect x="830" y="315" width="180" height="8" rx="4" fill="rgba(59,130,246,0.25)"/>
  <rect x="810" y="340" width="100" height="8" rx="4" fill="rgba(148,163,184,0.2)"/>
  <rect x="810" y="365" width="220" height="8" rx="4" fill="rgba(96,165,250,0.2)"/>
  <rect x="830" y="390" width="150" height="8" rx="4" fill="rgba(148,163,184,0.15)"/>

  <!-- Status badge -->
  <rect x="112" y="468" width="220" height="36" rx="18"
        fill="rgba(59,130,246,0.1)" stroke="rgba(59,130,246,0.25)" stroke-width="1"/>
  <circle cx="137" cy="486" r="5" fill="#22c55e"/>
  <text x="152" y="491"
        font-family="'DM Sans', Arial, sans-serif"
        font-size="15"
        fill="rgba(96,165,250,0.9)">
    Open to opportunities
  </text>

  <!-- Bottom border accent -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#accent)" opacity="0.4"/>
</svg>
