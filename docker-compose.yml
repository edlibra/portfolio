version: '3.9'

services:

  # ── Django application ──────────────────────────────────────────────────────
  web:
    build: .
    container_name: edlynexavier_web
    restart: unless-stopped
    env_file: .env
    environment:
      - DB_HOST=db
    ports:
      - "8000:8000"
    volumes:
      - media_files:/app/media
      - static_files:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn edlynexavier.wsgi:application --bind 0.0.0.0:8000 --workers 3"

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: edlynexavier_db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: ${DB_NAME:-edlynexavier_db}
      POSTGRES_USER: ${DB_USER:-edlynexavier_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-edlynexavier_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  media_files:
  static_files:
