# ─────────────────────────────────────────────────────────────────────────────
# Nginx configuration for edlynexavier.com
# Place at: /etc/nginx/sites-available/edlynexavier
# Then: sudo ln -s /etc/nginx/sites-available/edlynexavier /etc/nginx/sites-enabled/
# ─────────────────────────────────────────────────────────────────────────────

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name edlynexavier.com www.edlynexavier.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Redirect www → non-www (HTTPS)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.edlynexavier.com;

    ssl_certificate     /etc/letsencrypt/live/edlynexavier.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/edlynexavier.com/privkey.pem;

    return 301 https://edlynexavier.com$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name edlynexavier.com;

    # ── SSL ────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/edlynexavier.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/edlynexavier.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security headers ───────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    nosniff always;
    add_header X-Frame-Options           DENY always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Logging ────────────────────────────────────────────────────────────
    access_log /var/log/nginx/edlynexavier_access.log;
    error_log  /var/log/nginx/edlynexavier_error.log;

    # ── Static files (served directly by Nginx — fastest) ─────────────────
    location /static/ {
        alias /var/www/edlynexavier/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        gzip_static on;
    }

    # ── Media files ────────────────────────────────────────────────────────
    location /media/ {
        alias /var/www/edlynexavier/media/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Favicon ────────────────────────────────────────────────────────────
    location = /favicon.ico {
        alias /var/www/edlynexavier/staticfiles/images/favicon.svg;
        access_log off;
        log_not_found off;
    }

    # ── robots.txt ─────────────────────────────────────────────────────────
    location = /robots.txt {
        proxy_pass http://127.0.0.1:8000;
        access_log off;
        log_not_found off;
    }

    # ── Django app (Gunicorn) ──────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        client_max_body_size 10M;
    }

    # ── Gzip ───────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml
               application/rss+xml image/svg+xml;
}
